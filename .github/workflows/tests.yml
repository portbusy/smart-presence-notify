name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - python-version: "3.12"
            ha-version: "2026.1.0"
          - python-version: "3.12"
            ha-version: "2026.1.3"
          - python-version: "3.12"
            ha-version: "2026.2.3"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install homeassistant==${{ matrix.ha-version }}
          pip install -r requirements_test.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short
