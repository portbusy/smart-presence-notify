name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          echo "version=$TAG" >> $GITHUB_OUTPUT

      - name: Update manifest.json
        run: |
          python3 -c "
          import json, pathlib
          p = pathlib.Path('custom_components/smart_presence_notify/manifest.json')
          m = json.loads(p.read_text())
          m['version'] = '${{ steps.version.outputs.version }}'
          p.write_text(json.dumps(m, indent=2) + '\n')
          "

      - name: Commit manifest version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/smart_presence_notify/manifest.json
          git diff --cached --quiet || git commit -m "chore: bump manifest to ${{ steps.version.outputs.version }}"
          git push origin main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
